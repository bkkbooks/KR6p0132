註脚歸依即是大慈航警世詩周䟦陀羅不結良緣與善緣苦貪名利日憂煎豈知住世金銀寶借汝閒看幾十年又石屋大師茅簷雨過日頭紅瞬息陰晴便不同況是死生呼吸事黃昏難保聽朝鐘我見時人日夜忙廣營屋宅置田莊到頭一事將不去獨有骷髏葬北邙箇箇聞知有死生聞知何不早修行堂堂大道無人到開眼明明入火坑盡說修行不在遲今年還有後年期三塗一報五千劫出得頭來是幾時懷安養日觀大師聞道西方事宛然此行須藉好因緣磨教一念明如鏡不怕彌陀不現前生死循環那可逃此心未了慢徒勞如今不做輪迴夢只走人間這一遭勸念佛優曇大師人生四相難逃死天上何曾免五衰寧可九蓮居下品不來浮世受胞胎長生不用神仙訣救急還須海上方靠著主人無量壽算來都勝別思量一句彌陀開化門豈拘城市與鄉村直饒邪見人聞得也落音聲入耳根念佛偈度智大師佛在心中須著眼莫拋腦後不相看此時錯過真成錯欲似今朝恐大難又耑愚大師南北東西求所知怖頭認影總成迷直饒悟得生前事也要彌陀作導師繫心一句阿彌陀日用閒忙任寡多如是盡終不妙悟也教帶業出娑婆歸元鏡詞曲智達法師歎持經果最圓喜持名效最先驀忽地洗了塵心驀忽地洗了塵心袪了塵凡離了塵緣一霎時高步金堦一霎時高步金堦高標名姓高坐金蓮也須知自性的彌陀須自念疊疊叮嚀囑勸切切彌陀悲願滔滔的苦海深層層的業債牽鬧鬧喧喧輪迴了千遍早早登安養歸船時時禮古佛垂憐逍逍遙遙西方古路永永住無生國裡證真詮歎閻浮一戲場笑癡人成妄想把蝸角蠅頭晝夜忙日日裏醉華堂夜夜裏戀紅妝只道是百年無恙怎曉得霎時身喪俺呵世事兒曉露春霜一旦無常呀把一個好人身沒在愛河波浪歎輪迴苦未央幸我佛接慈航把淨土莊嚴細講詳度羣迷出火坑五濁內好悽惶痛三途悲涼難狀願個個都歸安養端坐在蓮華臺上俺呵因此上為眾悲傷極口宣揚呀怎能彀把閻浮化成華藏急忙忙浮生如電痛煞煞輪𢌞千遍浪滔滔苦海無邊一心心誰肯把彌陀念最堪憐無端愛慾牽無常一到只恐風箏斷四大分離眾業纏冤愆泥犁苦萬千懸懸極樂慈尊眼望穿如梭歲月拋歎百年都被蠅蝸勞擾少年豪氣到今日兩𩯭蕭蕭功名枉自窺蟻穴世事渾如夢鹿蕉歌纖調舞細腰五陵裘馬已寥寥無常限人怎逃豪華千古伴蓬蒿歎名利把人消耗喜彼岸今朝忽到聽言言實義皆元妙頓覺恍開心竅自今醒卻黃粱覺把聲色豪華一筆消修須早莫教他閻老出帖相邀真可歎世間人衣食苦利名焦把一個斷線枯骸戀阿嬌怎曉得一朝夢醒影兒消好苦也黃泉路隻影蕭蕭舉目無聊風流豪氣到此際只落得一場悲悼斜陽逝水傾轉憂深歸元未可傳燈信只是迷途鏡闇室燈還家近渾如良藥消迷性燈傳大地應無盡惟愿流通正法門人人盡入蓮華境滿庭芳一首莊嚴居士六十餘年片時春夢覺來剛熟黃粱浮華幻影有甚好風光冷眼輕輕覰破急翻身蹬斷絲韁兒孫戲從他搬演何必看終場青山茅一把殘生活計別作商量但隨緣消遣洗鉢焚香先送心歸極樂恣逍遙寶樹清涼堪悲也回頭望處業海正茫茫懷西本願曲慕西氏娑婆苦境終無了願往生極樂逍遙覲慈尊躬聆麈教引雙親三界同超四恩三有次第都酬報牢籠跳出樂陶陶蓮居住誠然妙不導引身無病老不耕織衣食豐饒無日月晝夜佛光普照四時和煦天氣無寒燠樓閣莊嚴皆七寶天樂悠揚異香繚繞池內蓮開五色花林中供命諸般鳥眾羅漢同為道侶諸上善盡是知交飛行自在十方佛國任遊遨功德水一飲胸中塊壘消從此斷除煩惱法門無量一一研究精奧將苦海眾生度却成就菩提道十二時頌皇甫士坊平旦寅常時佛課在凌晨一刻工夫十聲號能超生死出沉淪希有法妙難論往生全以信為因君能聽受無疑惑便是多生受記人日出卯朝露易晞人易老試將親友細尋思眼前多少埋芳草要修行須及早一寸光陰無價寶閒時不肯念彌陀直待臨終空懊惱日高辰人世遷居必擇鄰莫向人天求福報壽終難免再沉淪生忉利作轉輪暫時快活未為真勸君念佛求西去永作逍遙自在人禺中巳食時處處炊烟起自餐飽飯自充饑自己修持了生死子憶母母憶子到底工夫全在己捨身心見願王十萬餘程近如咫日南午佛日當空目不覩一條直路少人行反向長途受辛苦不談禪不揮麈念念彌陀常作主雖然身未出娑婆棲神已在蓮花土日映未六蛇共室真堪畏出沒閻浮是幾遭多生還不分涇渭猛回頭滌塵胄人命無常須不諱死字常將挂在眉纔覺西方有滋味晡時申歎息人身似轉輪此身不向今生度更向何生度此身休錯過莫因循幾多帶角與披鱗千佛慈悲難救度塵沙劫數自沉淪日落酉返照餘光不悠久堪笑愚人顧目前死生大事君知否臭錢財閒茶酒賺得凡夫終日走波波不暇念彌陀日月到來空束手黃昏戌一盞孤燈明夜室上牀別了襪和鞋魂夢冥冥黑如漆歎人身容易失要出輪迴須念佛無邊罪障一時消佛光皎似千輪日人定亥富貴功名不常在枕上黃粱夢未醒癡情猶自憂千載略因循成懈怠一息不來窮劫悔孤負西方老願王遙垂金臂恩如海夜半子淨穢相形分彼此不是娑婆苦折磨誰肯灰心厭生死既厭離要知止黃金地上樂無比眼前煩惱為誰來都是西方促裝使鷄鳴丑君欲往生誰掣肘煩惱場中正好修念佛須教心應口離是非無可否几事隨緣我何有但看蓮花不陸生結根偏在泥中藕大哉淨土門至簡亦至易持名願往生無人不果遂凡夫根器薄輾轉生疑二自疑積習深宿業難捐棄復慮念力微勝境莫能致不知無始來罪性本虗偽但能持佛名速滅生死罪如風掃雲霧如燈除暗昧雲暗本非真心空滌陳穢況此萬德名感應難思議如石性本沉得舟終不墜如人犯官刑皇恩能赦庇佛力妙難思自力亦奇異勿謂念力微念力必如意念比金石堅念比鋒刃利念西決生西念佛佛必至先聖言格言匹夫難奪志二乘見偏空執理而廢事遂謂無淨土心淨即土義不知心與土非一亦非二諸土唯心生一心眾生備極樂心之淨娑婆心之穢極樂是虗名娑婆亦應偽愛量生娑婆念專自西去淨穢既生心土亦隨所與譬如一輪月映入諸水內水清月自明水濁月晦昧月比本來心水比諸世界一心含萬剎莫作有無解無實亦無虗事理兩無詿呂祖全書純陽道人傳家寶揚州石天基性喜念佛日常不輟偶遊虎丘至極頂有靜室供呂祖像梁中挂木筆一枝其下承有沙盤傍坐一老翁石詢設此何為翁曰凡有疑事我用符呪代請祖師降此自然判斷石默叩時常念佛有無功效少頃木筆忽然自動作一判云云末書純陽道人贈揚州石子天基佩悟念佛虔誠即是丹念珠百八轉循環念成舍利超生死念結菩提了聖凡念意不隨流水去念心常伴白雲閒念開妙竅通靈慧念偈今留與汝參七期禁語念佛無作人名七日為期勿外求向西稱佛令無休光陰易過誠堪惜尊客臨門恕應酬欲成三昧早生蓮先在當人絕外緣口說是非增散亂故於七日不開言尅期禁語念彌陀痛䇿身心莫放他苦海深沉難自度願憑佛力出娑婆罪報因緣實可傷屢遭兵火受災殃誓從今世逃生死默默專求大願王普勸念佛頌西方有佛號彌陀接引眾生出愛河諸佛同宣當諦信臨終免得見閻羅禪機不悟也無妨只要專心念法王但得臨終生極樂頓開佛慧妙難量不通經典念彌陀勝過聰明智慧多六字洪名真法界徧收教海沒淆訛欲出死生老病鄉須求佛國大慈王彌陀本是天真父及早思歸莫暫忘樂慈父望娑婆垂手殷勤十劫多必欲此身超苦海從今速速念彌陀幸哉幸哉實幸哉法藏願門正大開極惡愚人能念佛臨終亦送紫金臺誠止人情自慚口過欲停聲恐負同心念佛人午後稍談生死事是非長短莫開唇光陰迅速命難存日日須防入死門客至休談塵世語當稱佛號莫停聲色身虗假是深冤百計安排亦枉然老病相侵尤可畏死時肨脹臭熏天淨土偈三峰禪師不非禪律與經師念念西方與麼持脫盡法中憎愛境自然蓮出淨心池晚聞村哭夜聞歌世事無憑變幻多歌哭兩忘心自淨單單一句古彌陀一聲煙篴倚牛肩草色青黃過一年牧得寸心歸淨土白牛無鼻不須牽世事駢闐老未休飄蕭白髮尚馳求處陰身共影俱歇一句彌陀是徹頭一日若真前後斷終身不念也相應臨終不待尋人助自有蓮花脚下迎蓮宗寶鑑白樂天極樂世界清淨土無諸惡道及眾苦願如我身老病者同生無量壽佛所樂文類神棲安養賦永明禪師彌陀寶剎安養嘉名處報土而極樂於十方而最清二八觀門修定意而冥往四十大願運散心而化生爾乃畢世受持一生歸命仙人乘雲而聽法空界作唄而讚詠紫金臺上身登而本願非虗白玉毫中神化而一心自慶詳夫廣長舌讚十剎同宣但標心而盡契非率意而虗傳地軸迴轉天華散前一念華開見佛而皆登妙果千重光照證法而盡廁先賢考古推今往生非一運來而天樂盈空時至而異香滿室一真境內現相而雖仗佛威七寶池中覩境而皆從心出故知聖旨難量感應猶長變凡成聖而頃刻即迷為悟而昭彰探出仙書真是長生之術指歸淨剎永居不死之鄉更有出世高人處塵大士焚身燃臂以發行掛胃捧心而立軌仙樂來迎而弗從天童請命而不喜或火烈山頂光明鏡裏絕聞惡趣之名永拋胎獄之鄙眼開舌固而立驗牛觸雞𪅎而忽止處鐵城而拒王敕須徇丹心坐蓮臺而賴佛恩難拋至理其或誹謗三寶破壞律儀逼風刀解體之際當業鏡照形之時忽遇知識現不思議劍林變七重之行樹火車化八德之蓮池地獄消沉湛爾而怖心全息天華飛引俄然而化佛迎之慧眼明心香爐墮手應讖而蓮華不萎得記而寶林非久奇哉佛力難思古今未有禪淨四料簡有禪無淨土十人九錯路陰境若現前瞥爾隨他去無禪有淨土萬修萬人去但得見彌陀何愁不開悟有禪有淨土猶如戴角虎現世為人師當來作佛祖無禪無淨土鐵牀并銅柱萬劫與千生沒個人依怙讚永明智覺禪師西湖居士李濟七返俱拈淨土鬮畢生不退事精修神棲安養因成賦堪以慈容掛九幽畫阿彌陀佛像偈并序東坡居士蘇軾錢塘元照律師普勸道俗歸誠西方極樂世界眉山蘇軾敬捨亡母蜀郡太君程氏簪珥遺物命匠胡錫畫阿彌陀佛像追薦冥福以偈頌曰佛以大圓覺充滿十方界我以顛倒想出沒生死中云何以一念得往生淨土我造無始業一念便有餘既從一念生還從一念滅生滅滅盡處則我與佛同娑婆苦白雲法師子喜觀警䇿言句今將娑婆苦六首添人愿與同病人共之娑婆苦長劫受輪廻不斷苦因離火宅祇隨業報入胞胎辜負這靈臺朝又暮寒暑急相催一箇幻身能幾日百端機幻袞塵埃何得出頭來娑婆苦身世一浮萍蚊蚋睫中爭小利蝸牛角上竊虗名一點氣難平人我盛日夜長無明地獄爭頭成隊入西方無箇肯修行空死復空生裟婆苦情念驟如風六賊村中無暫息四蛇篋內更相攻誰是主人翁無慧力愛網轉關籠一向四楞低搭地不思兩脚欲梢空前路更悤悤娑婆苦生老病無常九竅腥臊流穢污一包膿血𫎓皮囊爭弱又爭強隨妄想躭欲更荒唐念佛看經云著相破齋毀戒却無妨祇恐有閻王娑婆苦終日走塵寰不覺年光隨逝水那堪白髮換朱顏六趣任循環今與古誰肯死前閒危脆利名纔入手虗華財色便追攀榮辱片時間娑婆苦光影急如流寵辱悲懽何日了是非人我幾時休生死路悠悠三界裏水面一浮漚縱使英雄功葢世祇留白骨掩荒丘何似早回頭示陳行婆頌并序慈辯法師行婆見師師問修行許久婆稱修行多年師問曾見阿誰婆稱多見善知識師問如何指示答曰直截根源也不看經也不念佛師云錯了也因為說法婆既信服遂示以二頌直截根源不用修算來此語少來由會須把本逃生死念念彌陀勿外求念佛看經是本程須信從來水是氷但向根源深體究聲聲提起甚分明勸修淨業頌大智律師聞說西方最易求萬緣從此一時休輪珠疊足圓蒲上祇與彌陀作底頭化導念佛頌清照律師釋迦如實讚西方依正超倫意已彰信願持名無別想聲聲心住白毫光四字鴻名金口宣功成唯在我心堅神方簡易真希有一脫忻然處寶蓮念佛心要頌并序草庵法師釋迦如來說阿彌陀佛是法界身天台智者又言實相為體憑茲二說以為心要則十萬億剎若臨明鏡矣聊成拙頌自印其心或有知音能隨喜否無邊剎海海涵空海空全是蓮華宮蓮宮周徧徧空海空海獨露彌陀容阿彌陀佛不生滅難覓難拈水中月絕非離句如是身如是感通如是說我與彌陀本不二妄覺潛生忽成異從今掃盡空有塵父子天然兩相值誓修三福勤六念身口意業無瑕玷我今以此念彌陀不見彌陀終不厭勸世念佛頌浮世生身事若何猶如春燕壘巢窠波波役役營家計不如隨分念彌陀文章俊辯應高科朱紫榮身意氣多官高誰免無常至不如方便念彌陀飛鎗走射勢難過駿馬騎來疾似梭力敵萬夫輸老病不如習善念彌陀富貴資財不厭多朝昏計算恐差訛憂煩不覺頭如雪不如知足念彌陀音聲清響善謳歌一曲新詞格調和直饒唱得行雲墜不如淨口念彌陀柳眉星眼賽姮娥玉體時新著綺羅華容只可長年少不如及早念彌陀棋誇敵國智謀多打劫爭先在切磋光陰一半因茲廢不如端坐念彌陀商人經紀最奔波遠地他方到處過江湖風浪危中險不如歸去念彌陀慣會公方損陷他巧裝詞訟逞嘍囉家財漸破招人怨不如省事念彌陀殺業冤家漸積多將何詞理見閻羅教君一路超生法不如知悔念彌陀懷安養故鄉詩櫨菴法師西方真淨本吾家今憶歸程十萬賖客路竛竮都已困風塵孤苦最堪嗟七重樹聳千般樂八德池深四色華莫怪近來鄉夢切奈何榮辱事無涯昔年容易別瓊樓本也無心作遠遊豈意而今髮垂雪片懷長掛月西鈎枕中忍聽思歸鳥檻外頻驚落葉秋一炷檀煙一聲磬等閒遙望淚橫流懷西方詩可旻法師已知今是昔何非深掩柴門到落暉竹尾輕搖新月上簾腰半捲宿雲歸山林氣味盈懷抱松栢香煙滿布衣片石蒲團長宴坐寸心西趁落霞飛西指西瞿更向西向西西去有招提華開菡萏光無夜地布瑠璃瑩絕泥風動法音強八詠池流德水勝雙溪臨終但得超生去九品從教低處低淨土詠史西湖居士李濟能仁現穢取娑婆折攝剛強方便多橫截愛河無別法唯教專志念彌陀古往今來浩劫波二輪迭運急如梭循環六趣無休歇不解西歸奈爾何懷淨土詩明本禪師念佛須期念到頭到頭和念一齊收娑婆苦海風濤靜穩泛樂紅藕舟人問五欲事無涯利鎖名彊割不開若把利名心念佛何須辛苦待當來為存愛見起貪瞋埋沒黃金丈六身今日幸然歸淨土不應仍舊惹風塵要將穢土三千界盡種西方九品蓮仔細思量無別術只消一個念心堅七重密覆真珠網三級平鋪碼碯堦安養導師悲願切遙仲金臂接人來寄語娑婆世上人要尋歸路莫因循銀山鐵壁如挨透千葉蓮花別是春纔要歸家即到家何須特地起咨嗟門前大路如弦直擬涉思惟路便差勢至曾參日月光教令存想念西方自從親證三摩地不離慈尊左右傍清旦黃昏禮懺摩低頭泣告老彌陀輪迴六趣知多少誓欲今番出網羅老來念佛正相當去日無多莫暫忘南無阿彌陀六字是名越苦海慈航盡道少年難念佛我云年少正相當看他八歲龍王女掌上神珠放寶光和淵明歸去來兮給事馮檝歸去來兮蓮社已開胡不歸念吾年日就衰邁況世態之堪悲想東林之遺跡有先賢之可追趁餘生之尚在悔六十之前非如新沐之彈冠類浴罷而振衣滌塵垢以趨潔造妙道之離微顧瞻前路歸心若奔入慈悲室登解脫門萬境俱寂一真獨存爐香滿炷淨水盈樽望西方以修觀祈速覩於慈顏入念佛之三昧覺身心之輕安超九蓮之上品閉六趣之幽關會精神於正受杜耳目之泛觀俟此報之云盡指極樂而徑還循寶樹以經行踐華園而盤桓歸去來兮唯淨土之可游念閻浮之濁惡捨此土而何求喜有壽之無量曾何苦以貽憂與上善人同會友補處為朋儔池具七寶黃金為舟地平布於瑠璃無高下之坑邱樂音起於風樹佛聲發於水流聞者咸念三寶忻塵緣之自休已矣乎人生如夢能得幾時胡為名利之縈留此一報看盡兮將焉之浮世皆幻境樂土真佳期布蓮種於池內長念佛以培耔冀臨終時而佛迎垂敘別而留詩從此地地增進決證菩提何用疑擬淵明歸去來幻住居士仼彪歸去來兮西方淨土誓依歸既出離五濁之生死亦怙恃三聖之慈悲嗟人生之幻化憮急景以難追悟世緣如昨夢悼既往已皆非逮衰年以學道類大寒而索衣悔青春之放逸誤白業以虧微三途苦趣億劫迷奔如何解脫有大法門疑之則遠信之斯存誰其尸之彌陀世尊舒玉毫之色相晃紫金之容顏蔽諸來之大眾顯須彌之金山是以戒須堅持三聚齋則勤修八關加十念以精進庶禮足而諦觀幸人身而不爾猶寶所而空還雖聖凡之超絕喻水月以何難歸去來兮西方淨土多勝游寶樹羅網出妙音天衣純陀不用求但受諸樂之極永無眾苦之憂我彌陀世尊四十八願度眾生百千三昧頓熏修於宏誓海乘大願舟更無波旬魔怨但有聲聞比丘聆變化之眾鳥演法音而宣流觀音勢至堅固力接引行人無時休已矣乎末法眾生多弊惡諸苦境界叵淹留歸去來兮兜率終有墮龍華未可期唯有極樂國土功德莊嚴如此光色蓮華開九品清淨海眾待多時但辦信心不退轉決定往生無可疑追和淵明歸去來辭并序拙菴禪師拙菴野夫抱疾林下一日少閒試取陶淵明歸去來兮辭讀之不覺釋卷而長歎葢與予懷異世而同轍也淵明乃一俗士爾貧苦非不迫切尚且輕五斗粟不忍折腰於鄉里小兒自免去職樂賦歸歟況釋氏子為解脫故而求出家返奔走於塵域而不知止不為淵明羞乎予素以安養為故鄉欲述鄙懷以自勉輒追和高韻覽者幸無以効顰見誚亦各言其志也丁酉季秋望日書辭曰歸去來兮迴首故鄉何日歸覺寒來而暑往勞夢寐以含悲昔偶爾而為別今悔之而莫追望蓮池之勝友實負媿而知非嗟幾生之漂泊失繫珠於內衣旋深思而猛省何節操之卑微欲歸便歸一志西奔長生不死眾妙之門唯心本具真性常存棄捐周鼎返認匏樽空受賜於華屋遂孛戾於慈顏慨眾苦之迫切必去危而就安雖無適而不可奈客路之間關托二八之妙境入正受而遐觀忽全心而發現喜合浦之珠還混塵剎之淨穢隨足處以盤桓歸去來兮謝絕於外游且毀形而壞服唯解脫之是求曷區區而逐物恬然而弗以為憂喪自家之珍寶拋祖父之田疇方饑絕糧欲濟沉舟曾流俗之不若夫是之謂比丘苟聞義而不徙葢尋源而挹流照萬緣之寂寂藏六用之休休已矣乎人生變化同四時天邊日月無少留不自為計將安之有生必有死百年誰與期宜寸田以耕耨頻愛草以耘耔結廬山之淨社詠樝菴之新詩送心想於落日倐如羽化斷無疑淨土詩可旻法師家居常寂本優游來執魚竿苦海頭直待眾生都入手此時方始不垂鈎四色蓮華間綠荷一蓮華載一彌陀莫疑淨土程途達日日人生雨點多行樹陰陰布七重寶華珠網共玲瓏百千種樂俱時作天雨曼陀散碧空六方諸佛說誠言舌相三千廣讚宣池上托生蓮九品未知生向那枝邊但得蓮中托化來從教經劫未華開華中快樂同忉利不比人間父母胎樂清淨本吾家既有歸期豈憚賒行計會須勤䇿進淹留無慮在天涯混然凡聖本同途一點靈明體一如只為妄情隨物轉至今顛倒未逢渠經讚彌陀願力強劣夫為喻從輪王四天一日行周徧西去應非道路長徧看玉軸與琅函苦勸勞生脫世凡淨土好修還不肯莫教披却有毛衫暮皷晨雞不住催逡巡容貌變衰頹莫言白髮渾閒事總是無常信息來折疑論通相肅宗皇帝貌陋仁心古聖人混元造化定初分蛇身大皡開天祖牛首神農治世君舜目重瞳懷道德堯眉八彩有功勳非常行狀非常德莫謗如來金色身論孝出家行孝異尋常鬚髮蠲除未毀傷泰伯文身稱至德荊軻殞命號忠良比干剖腹剜心死芥子焚軀抱樹亡仁義葢由方寸造形服改變礙何妨評議野人冷眼笑王侯跪拜衣冠并不修大皡躶形并跣足神農露頂又髼頭漢王問道歸何尚堯帝尊賢敬許由若論納僧生計事青山綠水自悠悠殊見虗空法界總包羅水鳥山花漏泄何智者了然心灑落愚徒迷昧意蹉跎悠悠琴韻知音少壤壤巴歌和眾多奉勸世間邪見子收心早早念彌陀言符釋道儒流一化風休分南北與西東五常五戒何曾異三果三歸本自同老子掌中明至理達磨面壁顯真空時人不解源流意是是非非甚日窮總頌歷代名儒頌佛章始知西域教非常摧邪顯正張天覺捨偽從真白侍郎謗佛篇中無呂杜傳燈錄上有蘇黃聰明更有過先哲優劣心中自揣量靈峰宗論蕅益大師阿彌陀佛像贊一指光周法界十念成皆自在感應道交生佛無礙討甚自性彌陀只此豈屬心外諸佛正徧知海不離眾生心想是故眼見耳聞盡是彌陀聲像癡人捨此別求喚作法身向上誰知棄有覓空一體無端成兩若知兩既不存畢竟一何須尚熾然禮拜稱名即是超方伎倆淨社銘持戒為本淨土為歸觀心為要善友為依戒心戒方銘悔過不如防過惜福尤宜積福佛法深妙無窮切勿自棄自局若要熟處漸生先須生處漸熟贈戒珠有序戒珠禪兄鳳陽天長馬氏子刲股救父剖肝救母迨二尊謝世遂雉染願入予淨社拈此毗尼禪觀互莊嚴𢹂手同歸極樂天贏得孝思為行本戒珠朗握照三千警邃徵日照紙窗明驀然起悲思但有好順人曾無剛烈志猶如彼癡蠅只向窗前滯不肯猛回頭云何得出世淨土偈有序博山禪師拈淨土偈每云淨心即是西方土葢以因攝果也讀者不達遂至以理奪事幾成破法予觸耳感懷每拈西方即是唯心土俾以事扶理聊附補偏救弊之職云西方即是唯心土無上深禪不用參佛向念中全體露更生疑慮太癡憨西方即是唯心土未識西方豈識心逝子謬希圓頓解拾將落葉作黃金西方即是唯心土擬撥西方理便乖極樂一塵同剎海假饒天眼未知涯西方即是唯心土土淨方知心體空一切境風猶挂念云何妄說任西東西方即是唯心土莫把唯心旨趣誣迷悟去來元藏性謾言平等却成迂西方即是唯心土慧日高懸第一機事理雙融真淨業現前何法不玄微西方即是唯心土未到西方真可危夙障已如波浪湧那堪新孽又相隨西方即是唯心土離土談心實倒顛念念總皆歸佛海何須重覓祖師禪示用恒薙髮明心好向三皈始立志還從五戒先勤苦不辭成福聚誦持無闕悟靈源示寶所著有落人天著空墮三惡惟有西方土超出有無縛熾然求往生莫復存疑想介爾纔躊踟偏邪見日長贈若雲盡說乘為急誰知戒不迂缶缾難𫎓乳魚目豈成珠剎海遵遺教朝宗向樂都淨因期其勗力挽末時趨示初平發心莫謂菩提心難發屠刀放下立成佛莫謂菩提心易發杯水豈停鼎內沸欲明曠劫大因緣先把生平懷抱拂眼前活計若關情本地風光終受屈勸君速發難發心為仁由己非由物示涵宏欲求出世慧先斷世間愚身界元非實根塵性本無聞思宜自勗名利不堪娛念莫馳情境躬恒慎所趨三歸知究竟十戒握機樞和忍成心德精勤作勝謨持經神在定憶佛智能孚曳轉從前履超登最上衢警初平末劫修行少成多殆慎勿師心硬作主宰觀色察言如臨如在謙恭牧己毋思露彩但省我非不念人罪八喻銘心恒觀法海虗矯未除真味斯餒示戒明慢為功德賊勤為善法王福水慧舟楫無水舟不行欲求真實慧莫從口耳商苦志勞筋骨大任乃克將福至心忽開妙義能頓彰深造既自得世智誰可量胡勞歎為問丈夫兒胡勞發浩歎娑婆木苦空理欲原氷炭矢作奇男子空行已驚憚況復魔網稠觸處皆危難冥冥三界中何時夜方旦所以出世賓每勤如幻觀歲寒松柏榮爐熾金聚燦逆境是良師止貴衷不亂坐斷生死情當處即彼岸放下祖生鞭拈起秦時鑽為問丈夫兒胡勞發浩歎贈頂瞿師掩關念佛阿彌陀佛聲歷歷自他共離不可覓是心作佛是心是熾然感應真空寂驀直歸來莫問津無明睡裏轟霹𮦷醒來捫枕笑呵呵夢墮大河誰實溺夢時非墮醒非超一任凱風同奏勣髻珠解處紹功成內外空爭庶與嫡無生曲裏明月寒白牛背上吹橫笛和陳非白嚴冬落木轉凄凄積雪平鋪茅屋低舉世相看同敗北幾人能解早歸西晨朝共覲慈悲父飯後還要法喜妻消盡劫波生死夢渾然六字是全提贈耦西善財初發意百城方盡南一見普賢後始知西更湛十願導其往深禪不用參彌陀法界藏介爾一念含六字聲歷歷皎月澄寒潭未識岐塗苦那知此道甘五戒歌示憨月受戒易守戒難莫將大事等閒看浮囊渡海須勤護一念差池全體殘理勝欲便安瀾把定從來生死關任他逆順魔軍箭凜凜孤懷月影寒大殺生大慈仁物我一體如長春蠕動蜎飛佛性等賢愚貴賤無疎親不偷盜充義奧正直清廉明節操心外無法可當情菩提性具非他造不婬欲梵行篤身心皎潔同珠玉泰山喬嶽立清風等閒超出娑婆獄不妄語誠相與廣長舌相昏塗炬矢口千金敵國欽九界同歸作洲渚不飲酒離羣醜智慧照明獅子吼衣裡圓珠豈更忘免得親翁再苦口三歸五戒果精明觀音勢至為師友示馬光世未知個事難得知已知欲忘亦不易忘却威音那畔底今時方顯頭頭是著衣喫飯弄神通劍樹刀山任遊戲念彌陀算珠記夫婦知能第一義淨穢兩忘仍歷然法界分明無礙事一念圓彰四土嚴三身頓證驚長寐信得真見得至步步脚跟都著地以茲自覺覺眾生大知光明照十世偶成少年逐隊各懽呼獨坐孤峰萬慮枯愧有一端情未瞥強將殘羽覆新雛丙戌生辰驟雨初霽偶成四十不聞道五十猶空老縱滿百年春奚足稱壽考歲歲此日生此生何日了法門小比丘律行多未曉說時似惺惺用時仍顛倒數悔復數違嗟哉恒痛抱所恃格外慈示我三昧寶隨分度餘暉雷雨還晴皎靈奕生日以偈示之有德即有福無瞋即無禍心寬壽自延量大智自裕應思老頭陀願居眾人後破衲以遮身持鉢度貧陋示豁一華嚴圓頓經王普賢法界宗主十願導歸極樂便是玄極微旨若更別扣祖關都是奴僕婢使果然奇特丈夫卓信心作心是念念相應不差豈肯水中渴死瞬息旋轉萬流一句彌陀到底示寶樹修行無巧法只要生死切諦觀百年身露電同生滅千古大聖賢皆從一念決一念識重輕羣妄自超越事不益真修何能強屑屑心逸乃日休心勞乃日拙六字大經王勤誦無休歇能念所念本無二熾然能所相交徹譬如萬里淨無雲百千江瀆一輪月不是渠兮盡是渠非親疎處難分別病中口號夏病不知暑冬病不知寒夜長似小劫痛烈如刀山人間尚復爾何況三塗間歸命大慈父早出娑婆關大病初起求生淨土閻浮百苦鎮煎熬賴有摩提路匪遙六字洪名真法界一聲凡念海全潮濁流寸寸清珠映暗室塵塵寶炬招千古東林風未墜不須方便自橫超久向阿彌誓力深浮生無奈染相侵聞聲見色多忘念計後思前轉昧心痛極色聲緣自斷病危前後影方沉孤明六字全提出百獸羣中師子音乾慧初乾業未枯病深無計可支吾稱名不異兒號乳懺罪何殊囚伏辜乍慶此時方得主更慙歷劫枉成通丁寧法侶勤相助共解輪王髻裏珠持名真實是單傳念念圓成深妙禪能所本來無二體果因交徹即重玄廣長舌相堅真信周徧身光結法緣大事分明唯此事同仁共䇿祖生鞭蓮航櫓唱祖觀大師握算持籌甘為兒孫作馬牛紅粟倉中朽珠玉量成斗嗏阿堵滿牀頭死時空手多念彌陀好帶要纏走因此勸富戶錢翁早早修蒙袂低頭衣食艱難苦不周麤糲聊充口百結鶉衣肘嗏今世為貧憂來生依舊欲免饑寒早向西方走因此勸貧苦窮人早早修疾病堪憂枕席呻吟淚暗流痛苦誰能救方藥無人授嗏四大本瘡癅暫時不久無上醫王我佛遙垂手因此勸痛苦顛連早早修霜雪盈頭老態頹唐出入愁骨節枯枝朽面貌龜文皺嗏風燭一朝休無常早候十念臨終應悔蹉跎久因此勸年老龍鍾早早修飣坐風流如水韶光一霎留衛玠丰姿秀宋玉才華富嗏莫唱少年游幾人皓首蓮社追隨添個忘年友因此勸年少兒郎早早修皓齒明眸二八嬌娥住畫樓羞把鴛鴦繡未結鸞凰耦嗏紅粉泣香邱美人無壽離欲婆須好作華嚴友因此勸弱女紅閨早早修恩愛綢繆鴻案相莊情意投帳飲交杯酒衣結同心釦嗏大限忽臨頭鴛鴦分走極樂同生萬劫長相守因此勸夫婦同心早早修同室戈矛魚水夫妻作怨讐薄幸郎心負詬誶聞中冓嗏枉結鳳凰儔今成怨耦八德池中好種同心藕因此勸反目夫妻早早修燕子高樓節操氷霜詠柏舟黃鵠傷無耦隻景青鐙守嗏綽楔姓名留芳徽不朽高築懷清爭比蓮臺久因此勸寡女孤孀早早修禾黍油油辛苦農夫望有秋終歲勤田畝粒米難沾口嗏旱潦不勝憂凶荒常有熟念彌陀耘去心田莠因此勸南陌農夫早早修負販營求赤日當天血汗流呌喊沿街走專望謀升斗嗏微利逐蠅頭饑寒入口荷擔如來淨土生涯富因此勸負販謀生早早修銀燭搖歌帳珠簾捲翠樓看花切莫逞風流一被黃蠭螫手便堪愁歡事鐙前夢韶華水上漚探春爭唱少年遊試看白楊樹下土饅頭世人多說西方好西方有路人難到我佛忒多情丁寧勸往生勸君君不信只為西方近生死忽然臨彌陀何處尋起念當知念起如是既要託蓮胎如何念念造輪迴該不該該不該萬劫千生空鑄錯只為因循誤火宅炎炎休更住生也是千般苦死也是千般苦百歲光陰同薤露死後歸何處算除了往生無別路好也要西方去反也要西方去冬前白菜春前薺山厨自有真滋味貪箸口頭腥冤家債不清長齋無別訣只要饑時吃村舍過荒年家家斷午煙薙髮披緇法門游戲多生幸結香緣談玄說妙爭肯受人瞞只念彌陀六字作齋公應勝狂禪西方路不離當處一念未生前他鄉流浪久彌陀念我望眼將穿幸還家有日早辦腰纏多少天倫樂事聚蓮臺骨肉團𡈻回頭望浮生擾擾苦海正無邊笑傲煙霞討論桑麻闢荒田多種梅花白甘淡泊不愛奢華但土牆匡草亭子竹籬笆老樹槎枒破屋𢽽斜掩禪關不到人家蕭閒風味枯寂生涯且自打鐘自掃地自煎茶鴉陳斜陽雁背新霜漸農家早稻登場林間宴息水際倘徉看楓欲丹蘋已白菊初黃日用尋常空費商量甚來由急急忙忙麤茶淡飯溷過時光有一函經一缾水一爐香勸念佛歌吳笑拈先生上有老下有小是可憂憂之無益念佛好衣要煖食要飽是可憂憂之無益念佛好利空虗名潦倒是可憂憂之無益念佛好禍難堪福難保是可憂憂之無益念佛好甫長大旋衰老是可憂憂之無益念佛好離別多歡會少是可憂憂之無益念佛好水火侵盜賊擾是可憂憂之無益念佛好暑去遲寒來早是可憂憂之無益念佛好惡業纏病魔繞是可憂憂之無益念佛好生勞碌死苦惱是可憂憂之無益念佛好雲棲詩偈蓮池大師恩重山邱五鼎三牲未足酬親得離塵垢子道方成就嗏出世大因由凡情怎剖孝子賢孫好向真空究因此把五色封章一筆勾鳳侶鸞儔恩愛牽纏何日休活鬼喬相守緣盡還分首嗏為你兩綢繆披枷帶杻覰破冤家各自尋門走因此把魚水夫妻一筆勾身似瘡癅莫為兒孫作遠憂憶昔燕山竇今日還存否嗏畢竟有時休終歸無後誰識當人萬古常如舊因此把桂子蘭孫一筆勾獨占鰲頭慢說男兒得意秋金印懸如斗聲勢非長久嗏多少枉馳求童顏皓首夢覺黃粱一笑終無有因此把富貴功名一筆勾富比王侯你道歡時我道愁求者多生受得者憂傾覆嗏淡飯勝珍饈衲衣如繡天地吾廬大廈何須構因此把家舍田園一筆勾學海長流文陣光芒射斗牛百藝叢中走斗酒詩千首嗏錦繡滿胸頭何須誇口生死跟前半字不相救因此把葢世文章一筆勾夏賞春遊歌舞場中樂事稠烟雨迷花柳詩酒娛親友嗏眼底逞風流苦歸身後瞬息光陰懡㦬空回首因此把風月情懷一筆勾勸修四料簡作福不念佛福盡還沉淪念佛不作福入道多苦辛無福不念佛地獄鬼畜羣念佛兼作福後證兩足尊示廣位病從身生身從業生不造諸業禍消福增娑婆念佛極樂標名一心不亂上品位登題涅槃堂有序真歇了禪師有涅槃堂詩一律悽惋警切令人悲感興起予乃續成四律置之堂中未必非病僧藥石云原作訪舊論懷實可傷經年獨臥涅槃堂門無過客牕無紙爐有寒灰席有霜病後始知身是苦健時多半為人忙老僧自有安閒法八苦交煎總不妨今和幻質𡩋知有敗傷舉頭驚倒涅槃堂一生盡也殘更夢萬慮灰來皎日霜過去業多心主亂前趨路險脚跟忙而今欲問安閒法臨渴開池事已妨徒入空門最可傷涅槃今是試僧堂炎燒五內魚遊釜痛切諸根草被霜獨抱癡禪成底事旁修外術枉千忙人人道有安閒法爭能臨行一句妨脫體無依絕毀傷沉疴終日自堂堂心燈破暗明如月慧劍降魔凜似霜藥病兩非何足辯死生雙幻不順忙從誰更覓安閒法纔說安閒便有妨除夕上堂六字真經攝義多總持一似唱也娑自從驀直西方去閒殺臺山指路婆七筆勾玉貌嬌柔自古風流不到頭粉黛骷髏傾刻雞皮皺休同埋黃土空回首生死堪憂金枝玉葉同塵垢因此把美麗華容一筆勾鸞鳳同儔恩愛情深終有休伉儷非長久歡合難同壽休無常一到終分手緣盡難留歡娛夢裏曾知否因此把夫婦情深一筆勾子爵孫侯御敕王封得意秋種福難生受榮誥非長久休黃虀布衲隨緣守前生種就一切都是今生受因此把子貴孫賢一筆勾畫閣瓊樓高捲珠簾樂有休銅臺存否金谷園無有休茅簷草舍安心守蝴蝶夢遊醒來原是空空構因此把朱戶高堂一筆勾美味珍饈殺孽冤冤報未休滋味下咽喉轉眼成仇宼休冤家相遇誰來救淡飯無憂油鍋湯鑊因人搆因此把美味嘉餚一筆勾世事空浮積玉堆金終也休羅綺千箱搆珠寶難延壽休眼前耀目虗消受件件空憂徒添煩惱成烏有因此把玉帛衣珠一筆勾急早回頭病老臨身未可修不必拋家走心淨原離垢休彌陀一句時時究生死關頭臨終佛引西方走因此把世念塵情一筆勾語錄省庵法師示禪者念佛偈一句彌陀頭則公案無別商量直下便判如大火聚觸之則燒如太阿劍攖之則爛八萬四千法藏六字全収一千七百公案一刀斬斷任他佛不喜聞我自心心憶念請君不必多言只要一心不亂念佛警䇿生死難脫輪迴難避淨念難純妄心難制勿學虗頭勿談襍語奉勸諸人切莫容易警世偈茫茫大夢中長夜誰能寤反戀夢中歡將醒還重做做得不如前一錯是百錯做得勝如前依然空懡㦬造了夢中業從苦又入苦勸君早回頭直走西方路萬緣都放下勤修淨業課日夜望還鄉一心求覺悟阿彌陀佛像讚南無阿彌陀何人不知念雖念不相應母子難相見行住及坐臥時將此心斂念念自相續念來成一片如此念彌陀彌陀自然現西方決定生終身無轉退寸心齋銘尊客相逢勿談世諦寸香為期唯道是語不近人情不拘俗禮知我罪我聽之而已東銘父母生汝師友成汝汝今負恩不孝不悌佛念未純妄心未制汝即地獄地獄即汝廁室銘大小便時毋忘正念九孔常流此身可厭何當棄舍蓮胎轉變念念彌陀西方定現勸修淨土詩我教原開無量門就中念佛最為尊都融妄念歸真念總攝諸根在一根不用三祇修福慧但將六字出乾坤如來金口無虗語歷歷明文尚具存瑠璃地上絕塵埃晏坐經行亦快哉錦繡織成行樹葉丹青畫出眾樓臺漫空華雨諸天下徧界香雲大士來何處忽生新佛子芙蓉又見一枝開土淨能令心自空無邊妙色現其中千燈互照身光映十鏡交輝佛土融珠網重重懸寶樹天童歷歷在華宮龜齡鶴算渾閒事直得虗空壽量同稱性莊嚴非外得天然果報自無窮一塵徧入諸塵裏萬法全收一法中華映玉池人倒影身遊佛國地俱空色心依正原無礙但得情忘境自融彼方殊勝事無窮依正由來總不同剗盡青山鋪碧玉收乾滄海出虗空法音自演風柯裏妙義平宣水鳥中諸佛眾生同一體互相周徧盡圓融淨土因何獨指西要令心念有歸栖一門入後門門入初步迷時步步迷直就下凡階上聖不離煩惱證菩提蓮華勝友應相待何日歸來手共𢹂如來本願非虗誑稱我名皆到此中莫患棘牆無客住只愁枷鎻幾時空百川歸海水寧溢萬國朝王地豈窮易往無人真可惜不知何事戀樊籠人傳天竺是西方世傳西方去此十萬八千里是錯認五天竺國為西方也天竺支那在足傍天竺人呼東土為支那天竺支那同在南瞻部洲足跡可到莫向泥途分淨穢同居五濁寧分淨穢休從火宅辨炎涼同居三界奚別苦樂三千世界非吾土四大部洲須彌山六欲天各滿一千名小千世界千個小千世界名中千世界千個中千世界名大千世界總此三千大千世界名為娑婆世界皆釋迦牟尼一佛所化之境也萬億乾坤是故鄉極樂去此十萬億三千大千世界去去莫愁途路遠不勞彈指見空王天台云臨終在定之心即淨土受生之心動念即是生淨土時莫說西方為譬喻有人云西方是譬喻之說乃誘引凡愚為善非實事也故言此須知名與實相應譬甜似蜜非無蜜喻冷如氷却有氷槐國阿誰招客去蜃樓何處勸人登如來大聖成虗妄謗法愆尤懺未曾若執往生為妄想或謂念佛是攝妄想一法若求生西方翻成妄想豈言住此便成真若言生西方是妄想則住著娑婆妄想尤甚東西不著尤非理若言我今不求生彼亦不住此二俱不著隨意受生此尤非理何者既非法身大士又非應化聖人欲愛未除業緣未斷若不生西方定生此土既生此土則仍在輪迴業力所牽三途有分安能隨意受生耶淨穢雙忘亦是塵只此淨穢雙忘一念亦是情計尚屬法塵所攝若真雙忘則何礙求生生本無生生四土見猶離見見三身須知真妄原同體迷悟由來總在人纔勸往生言著相儘思貪戀却迷蒙無生畢竟有生在有執斷見者言死後永滅都無生處不知業牽識走畢竟復入胞胎除卻念佛徃生更無有脫離處離相依然住相中若言死後永滅不求往生名不著相是則離緣起相生斷滅相斷滅相者是邪見法念與佛融方是即荊溪云體不二故方名為即近世聰明之土皆言即心即佛及勸念佛便言著相不知念佛念心本來一體但執念心不信念佛則心佛是二何名為即心將境異不知空即事顯理名為真空撥事求理名惡取空近世聰明之士亦知心淨土淨語以淨土便言著相不知心外無土土外無心但執唯心不信淨土則心與土劃而為二此惡取空非真空也會須信佛雙忘後日照山川處處通都言淨土唯心是十萬餘程是外求但執妄心居在內若言十萬億佛國之西方是外求者則認方寸妄心居內便同阿難所計七處之一不知真性體全收棱嚴經云當知虗空生汝心內猶如片雲點太清裏況諸世界在虛空邪彌陀諸佛鏡中影極樂娑婆水上漚取捨厭欣無礙自家屋裏任優遊欣自心之淨故取厭自心之穢故捨一取一捨不礙唯心何外之有都言處處是西方平地高山總不妨入廁豈宜還塞鼻衝泥何事尚褰裳病來那得心無苦夢裏焉知身在床莫話空言違實行好憑落日望還鄉休言極樂苦難生纔說難生是障門佛力自能除業力信根端可疑根深逃私債藏王府現受官刑遇聖恩早晚相從裹糧去此生終不負慈尊莫執壇經排淨土祖機佛語並圓融因言薦理彰吾教得意忘言顯本宗十善齊修焉造非羣賢共會豈還蒙他方此土何來去法界明明在眼中念佛休嫌妄想多試觀妄想起於何無心收攝固成病著意遣除亦是魔救火抱薪添烈焰開隄引水作長河直須字字分明念念極情忘有甚麼欲得工夫無間斷直須精進始相應暫時失念雲霾日瞥爾生心峨掩燈小水長流終貫石沸湯停火亦成氷往生作佛非閒事只在當人念力能行時正好念彌陀一步還隨一佛過足下時時遊淨土心頭念念絕娑婆謗華隨柳須回顧臨水登山莫放他等得阿儂生極樂十方來去任如何外道一心差處路歧逢自造經書立本宗即今五部六冊一切外道之類皆偷竊佛經襍以鄙語以成己典兩扇門邊傳秘訣三家邨裏聚羣蒙樂有路原平直佛法無私本至公奉勸回頭歸正教彌陀念念見真空苦世間唯有苦人多自造新殃可奈何滿地蓬蒿春不到一身枷鎻夜難過稱冤莫更呼天地呌痛應須念佛陀三界從來是牢獄勸君及早出娑婆樂莫道人間樂事稠由來樂極轉生憂滿城華柳𢹂佳客徹夜笙歌醉畫樓但覺酒來人面上那知死在脚跟頭西方淨土真為樂但念彌陀便往遊閒閒人念佛正優遊莫把光陰空裏頭老有音書頭漸白死無官帖命難留身前預把資糧辦眼底休為兒女愁家在樂歸去好自然衣食不須謀忙勸君念佛未能閒等得閒來病現前心到亂時須著眼念從忙處要加鞭千軍隊裏單刀入百沸湯中勺水傳佛不礙忙忙自礙便從今日奉金仙老暮年光景苦無多電影漚華一剎那黃葉漸凋真老矣秋風將至奈愁何無心不用貪浮世有口唯應念佛陀珍重臨行須努力莫教萬劫自蹉跎病疾病由來是藥方深知生死是無常重刑受過悲牢獄劇苦常來厭革囊念念彌陀休背覺心心極樂願還鄉何時得受清虗體壽極河沙不可量死死時莫漫自驚惶念佛人第一切忌怕死怕死則不得徃生多有一生念佛臨終唯務服藥求醫都不說著徃生之事此怕死之過也撓動正念平日理明臨時不誤繫念殷勤向彼方膿血漸拋皮袋子腥臊將脫垢衣裳多生煩惱真疴瘵一句彌陀是藥王苦海深沉但求出莫愁佛不駕慈航一自娑婆繫業因多生流轉實酸辛須臾出屋又投屋迅速捨身還受身曾作王侯爭國邑幾為螻蟻喪埃塵這回若不思歸去依舊從前受苦輪彌陀慈父願門開攝受羣生等一孩膿血團中離臭穢蓮華香裏受胞胎但憑淨願為良導只有狐疑是棄材濁惡娑婆難久住早同善友賦歸來八苦詩生業風吹識入胞胎獄戶深藏實可哀每遇饑虗倒懸下頻驚粗食壓山來聲聞到此心猶昧菩薩於中慧未開誓割愛緣生極樂華中產取玉嬰孩老萬事輸人已退藏形骸自愧少康莊朱顏一去杳無迹華髮新來漸有霜流淚暗思童稚樂見人空話壯年強寧知淨土春長在不使身心晝夜忙病四大因時偶暫乖此身無計可安排殘燈留影不成夢夜雨滴愁空滿街自昔歡娛何處去只今苦痛有誰懷豈知極樂清虗體自在遊行白玉階死識神將盡忽無常四大分離難主張脫殻生龜真痛絕落湯螃蠏漫慞惶甘心獄戶為囚侶束手幽關事鬼玉何似華開親見佛無生無滅壽難量愛別離生離死別最堪傷每話令人欲斷腸虞氏帳中辭項羽明妃馬上謝君王淚深江海猶嫌淺恨遠乾坤未是長諸上善人俱會處願教曠劫莫分張怨憎會若事人情皆欲逃誰知夙業自相招有錢難買閻翁赦無計能求獄卒饒兵敗張巡思作鬼身亡蕭氏願為猫何時得預蓮池會積劫冤讐好共消求不得窮達由來有夙因轉生希望轉因循揚帆屢見沉舟客挂榜偏傷落第人畢世耕耘難果腹頻年紡織尚懸鶉樂衣食天然好不用區區更苦辛五陰熾盛色受想行識為五陰色陰是身及一切有形諸物四陰是心熾熾者猛勇也逼迫身心苦事多哀聲無地可號呼肝腸斷處情難斷血淚枯時恨未枯臨海廿年持使節過關一夜白頭顱何當淨土修禪觀寂照同時離有無灑水囊護生方便最為難細行宜修莫自寬性命由來無大小死生從此有交關一毛去體猶知痛滿盞充腸豈忍䬸奉勸行人須仔細朝朝蟲水要勤看淨業堂詩并序庚戌春三月余禁足於梵天寺之西院右偏額其室日寸香齋尊客相見略敘道話數語寸香之外念佛而已作詩以見志并告眾云省公鬻產搆禪房古寺重開淨業堂盡掃萬緣如涕唾憑將四字作資糧同人共結三年社對客空餘一寸香三昧未成功未熟此身終不到城隍偶成無能祇合住深山一室蕭然獨掩關寄語世人休見召此生終不到人間百八輪珠六字經消磨歲月度光陰平生只有西歸願肯為他緣負此心破舟救溺理無由抵死須撐到岸頭等得篙師登陸後更移新棹入中流醒世歌憨山大師紅塵白浪兩茫茫忍耐柔和是妙方到處隨緣延歲月終身守分度時光休將自己心田昧莫把他人過失揚謹慎應酬無懊悔忍煩作事好商量從來硬弩弦先斷每見剛刀口易傷惹禍只因閒口舌招愆都為熱心腸是非不必爭人我彼此何須論短長諂曲貪瞋真地獄公平正直是天堂麝因香重身先死蠶為絲多命早亡世界從來多缺陷幻軀那得越無常人從巧詐誇伶俐天自從容定主張喫些虧處終須好讓他幾分又何妨春日才逢楊柳綠秋來又見菊花黃榮華總是三更夢富貴猶如九月霜老病死生誰替得酸甜苦辢自承當一劑養神平胃散兩重和氣瀉肝湯生前徒費心千萬死後空餘手一雙悲歡離合朝朝鬧富貴窮通日日忙勸君切莫要爭強百年混世戲文場頃刻一聲鑼鼓歇不知何處是家鄉優填王圖無作人名一年又一年苦樂正無邊年盡命亦盡終必赴九泉一月又一月世情圓復缺圓缺幾時休到頭無可說一日又一日寸心長兀兀嗟哉行路難塵勞現火宅一時又一時蓮漏何嘗遲甘露不能嘗空自誤修持一刻又一刻命光如過客寸陰流水去欲住何能得一息又一息人鬼關頭急一片光明心因果靈靈必遺集徹悟禪師念佛偈自性彌陀彌陀自性執性廢修因藥成病極樂唯心心唯極樂離土論心翻然大錯說著蓮雨淚垂閻浮苦趣實堪悲世間出世思惟遍不念彌陀更念誰癡迷一念入娑婆長劫沉淪可奈何穢土欲翻成淨界全機撥轉念彌陀自憐身作太平僧了死脫生却未曾但願名標蓮蕋裏不須高列上傳燈猛切持名如救頭娑婆那更可遲留即今撒手便歸去已較前賢輸一籌一句洪名一寶蓮聲聲流出自心田但教念念能相續不怕彌陀不現前已知安養是吾家歸去休教路更差不念塵緣唯念佛珍池高占寶蓮花我念彌陀有課程晨昏十萬句分明但教盡報常如此淨業誰論成不成故鄉一別久經秋切切歸心不暫留我念彌陀佛念我天真父子兩相投一句彌陀念便獃恰如死了未曾埋娑婆已竟多生債淨土而今歸去來洪名六字水清珠方寸澄澄百慮無個裏風光難舉似長天萬里月輪孤一句彌陀法界宗千門萬戶盡羅籠只須淨念能相繼四土三身影現重讚血畫彌陀佛像瀝乾指血畫彌陀畫得彌陀意若何暮禮朝參常供養臨終導我出娑婆慚愧走他鄉竛竮苦徧嘗追思腸寸寸回首淚行行刀裂不堅指血塗無量光慈恩何以報珍重一爐香大悲熏曠劫滴血現全身本自關天性何曾隔點塵為