何處風吹寶樹成音空際飛行自在超逾三界英靈消息一行三昧功夫四字真經賦得醒迷福報人身在紅塵勸勿迷無明皆鴆酒有悟即鴻泥境幻紛妍醜情多襍笑啼吉祥徒夢鹿歌舞總醯雞花或開時好枝隨穩處棲飄零終敗北方便只生西但使緣離妄何愁遇未齊心空真及第不動照留犁蓮修警䇿玉尺禪師願共端居念佛名願同展卷話生平鏡燈交涉光明足成就蓮花上品清一句阿彌陀真實開方便念念無間斷萬法融真念聲聲不斷念彌陀放下塵心得力多影去影來何所極鏡輪終日久揩摩真宗本自無言語教我憑空說甚麼聞道諸天猶未了不如隨喜念彌陀天意憐幽草人間重晚晴老年修淨土從此快生平提起滿虗空極樂在其中音聲無限量曲折成玲瓏一副急淚幾身大汗方是念佛人轉身消息化知見志慮紛淆面目殊凡愚到此總糢糊一漚起處亡全海引得身身不丈夫同中有異異中同權實高低一照中消盡執情心量闊聖凡階級滿虗空片念真能轉聖狂凡愚未信實堪傷讀書萬卷成何用添得輪迴夢一場大哉無量聖人心吞吐虗空閱古今道在光明書在紙不須言淺更言深勸正修都因戀此苦娑婆自取輪迴受折磨朝夕勞勞無一是可知那事竟如何日課彌陀一卷經心空及第夢初醒回頭細數塵寰事都是金輪蟻子形觀見彌陀勝別參清涼一劑破沉酣善財已入蓮池會不記童年五十三普賢願王如是引導性空何處有娑婆火聚蓮開願力多一句平超無量法根塵消落即彌陀念佛音聲作布施人間天上更何私莫言此念無滋味總有花開見佛時神聽出口入耳以神涵之靈光內熏根塵將落故靜演之奇福端歸極樂鄉未曾西去已清涼音聲妙出蓮花舌一句彌陀字字香惆悵吾生不自由依人作計漫牽愁靜聞佛號如初覺此去焉能戀海漚香風澹蕩帶秋煙不是凡人不是仙一念彌陀超色相音聲搖曳月初圓此聲如玉更如金寫出彌陀一片心自有無生消息到人間天上幾知音器和一聲功德已無畺況復聲聲正念長入聽如雷無彼此令人卻憶鼓音王無端秋色自西來人靜宵深畫角哀烈士功名心不死願從極樂起金臺心聲普現無邊聞性一時開上徹遙天下九垓與我念光相映發英靈無數總歸來念境靈熏煉重重遺粗得妙徃生造詣非託空言故復摹之一聲佛號起聞根想見西方世所尊逸韻溶溶超色相飛心別現妙乾坤極樂滿現花嚴花嚴剎海淨穢全涵上上蓮修盡法界量故透發之重重無盡十𢆯中極樂花嚴法界通誦得聲聲無量壽一蓮宮裏眾蓮宮風吹逸韻遶千花供養彌陀即釋迦天外何人同此調飛空樓閣燦雲霞星幢來往道場多無限英靈出愛河端坐虗空齊入定東西過現總彌陀才說西方現十方十方唯一法中王法王名字威靈震內外諸魔幻影亡本地風光本來離妄即依真一片心光剎剎塵方寸靈明涵淨土往生誰是少良因生死事大無常迅速圓聚心神到極樂國生平少讀十年書相見何遲願不殊好種蓮花完舊約往生佳境本非虗娑婆久欲卸征衫一念深深去復還誓共懺除身口意與君飛出死生關從容妙轉法王輪無限精良寫一真成就道場佳子弟娑婆極樂總長春泥沙點點換金沙肯離娑婆即到家處處飛行承足底誰言陸地不生花長短句我與君淡月疎燈妙寫冷冷韻我與君經卷爐香好結深深信我與君相知一味全無病我與君累劫心期圓融一鏡願轉塵緣作淨緣那堪佛印兼魔印我與君蓮約生生訂我與君本然天事不在隨和我與君心期蓮約寶脈金波我與君番番相見兩無他我與君警䇿莫蹉跎平生密詣歸安樂百歲童真仗佛陀我與君歡喜出娑婆我與君和風甘露一點真機我與君清涼適可無縫天衣我與君蓮花剎海俗塵希我與君一佛共依依殷勤行願通而穩靜妙音聲秀更微我與君圓滿共西歸生平事宛轉未依心寂寞人天同志少寶花慧月及時臨感激遇知音一一同願友盡坐蓮花臺我生淨土時一一蓮花開靜中一味本清涼不向仙都覓異方在手菩提珠百八心心寫出妙蓮香此心已共寶花開蓮信初從淨土來不離一真成佛脈與君同坐紫金臺夕陽明月小橋西人影蓮香入望齊聞道彌陀恩願足傾心先奉紫留犁番番紙墨寄殷勤每向蓮即憶君遙對西風頻寄語光明法藏好同熏寶韻浺瀜妙入微十方花雨正初飛生生結契休忘卻一品蓮修願不違光明初現紫留犁照我心期直到西聞說彌陀悲願切遙垂金臂共提𢹂蓮消息并序妙空大師真心本體清淨圓明不屬一邊全該萬法乃以無始一念忽起無明遂於清淨本然現出虗空大地譬如燈中有鏡鏡中有燈六道四生重重無盡諸聖諸凡普同出世回環映現化度不休遠矣哉人之生也十月血腥三年乳濁從一世及多生緣影為心四大為身生死死生形神流轉莫補江心之漏空增夢裏之哀苦樂千般恩仇萬變分明因果當局全迷可深歎也此書層層解說剝去粗庸脉脉深涵出生眾妙歸家一路導我前行九品之文顯出往生淨土異方便矣利益有情同生安樂淨土圓現娑婆頓空佛國為家蓮花在足光明鏡影無有纖痕莫更遷流致生種種二尊分兩土以法救羣迷為勸居東者回心直向西本自心中現光涵世界多從今一直去念念見彌陀有緣齊受度久被佛恩多點化娑婆眾光明出愛河專切讚彌陀極樂莊嚴處唯願一切人速往西方去至妙至玄機一直無彎曲非淺亦非深佛機原具足一際光明照十方巍巍不動法中王無邊世界三災起淨土高標七寶幢彌陀光照本無邊大地虗空及遠天何處是人歸結處青黃赤白紫金蓮更無魔外與兵戈一片光華顯佛陀諸上善人同聚會化禽天樂六時多奇哉一念感西方接引而生大吉祥如此娑婆真熱惱不如歸去便清涼完我一心量念佛阿彌陀十方諸剎海從此息奔波相爭相殺幾時休錯換頭顱更起仇有意無心都是孽將他性命作珍羞晝夜忙忙不得閒何時金玉積如山人天坐處更番變管庫財神又換班地獄慘極心昏惡未消長年受苦實難熬千生萬死身形換頃刻阿旁又試刀畜生可憐生死不曾停命賤身輕體不靈猶欲爭強互婬殺畜生心事太零星餓鬼慘澹飄搖鬼趣哀苦辛奔走役風雷貧窮更受燒身報幻影重重痛不回人道人身幸得已非安百歲須臾落死關一點假銀充不去半生辛苦更何堪修羅人我相爭勝負臨飛沙走石殺人心修羅太苦酣征戰魂夢匇匇刀箭林天道十善頑修夢入天精求秘訣作羣仙未消結限離生死無量精神總落邊苦哉謗般若處處亂真心引得千生誤何時得好音背覺無所知覺者來度之化現方便力破盡貪瞋癡即以塵中人化作出塵侶囅轉如來恩望汝生西去一覺大夢醒不覺夢方酣辛苦受輪迴何日返家山打落重重障礙自然脫體清涼可憐塵海更茫茫障裏還生別障不出圈子裏顛倒夢魂多誤聽旁人話依然入網羅處處幢幢風入定層層樓閣寶含光人心到此全無垢盡是如來解脫香八功德水映金沙七寶池中九品花禽鳥勸人勤念佛六時天樂不喧譁不誦經文不坐禪也無佛法與君傳只將一句彌陀佛用作西方淨土緣念佛人皆有宿緣從今更不落人天勤勤引得心光發九品蓮花必現前極樂彌陀德大哉清涼世界寶蓮臺化禽晝夜音聲起喚得人人心地開神超三界外心現一聲中體用分明在無邊念力雄娑婆苦娑婆苦娑婆之苦誰能數無窮升降逐風輪插脚難憑多失所出沒閻浮不可停頭顱改變成今古何不及早念彌陀免此娑婆苦西方樂西方樂西方之樂全無作自然生起念佛心風吹樹網成天樂辟支聲聞入一乘人天善道無三惡何不及早念彌陀領取西方樂祖師明明說汝等細細聽歸家無二路一佛鎮常靈精進事成就切勿任麤心一心不退轉花開寶月臨一佛是定專念是慧念入佛慧真成三昧蓮花韻自清光圓氣乃足娑婆鬧不清依舊沉諸欲一佛無量佛莫作種種見會念彌陀者佛佛皆護念心念紛飛起無一而可成他端得力處彌陀更不真純心終入脉恍惚即亡真願願交光處彌陀度此人欲去即便去欲住即便住極樂無量光明明一條路一句四箇字送汝到西方若愁不得去及早好商量作家手筆也尋常演出蓮花自在香莫道修行無規矩依他所說便清涼凌空一步最安詳心現蓮花便吉祥莫道其中無九品本來舉念即西方西方徑路并序古崑法師夫一句彌陀稱徑路者乃橫絕迷源直投覺海至簡易至直捷之大方便也故經云若人但念阿彌陀是名無上深妙禪要解云當知執持名號既簡易直捷仍至頓至圓以念念即佛故不勞觀想不必參究當下圓明無餘無欠直指云無上正徧知覺普應機宜說法三百餘會皆令羣有同證真常求其機宜相感生佛緣深至簡至易而功高捷徑者無越求生淨土一門況五濁盛時眾生垢重餘道修行必難成就而匪仗此門其何從疾脫生死是故娑婆教主再四叮嚀十方如來殷勤勸往千經萬論處處指歸往聖前賢人人趣向大矣哉一句彌陀真可謂渡苦海之慈航生西方之徑路也昔善導和尚專志於此眾稱彌陀化身豈欺我哉詳其自行化他總不出彌陀一經之妙旨乃云眾生障重境細心粗識颺神飛觀難成就是以大聖悲憐直勸專稱名號正由稱名易故相續即生若能念念相續畢命為期十即十生百即百生徹悟禪師云倘置佛名而別修三乘聖行亦是浪用精神亦是千鈞之弩為鼷鼠而發機況造六凡生死之業乎一句阿彌陀徹底悲心說聞此難信法當願生彼國一句阿彌陀壽命不思議及其諸人民一切皆無異一句阿彌陀無量功德力大石置船上必定不沉溺一句阿彌陀罪除無量劫聞名尚離苦何況憶念切一句阿彌陀末法緣最深餘行難成就唯此獨超倫一句阿彌陀諸佛異方便欲生安養國應當專心念一句阿彌陀千經萬論宣彼佛與我等宿有大因緣一句阿彌陀慧遠知幽玄功高極易進念佛最為先一句阿彌陀蓮池具正見臨終垂慈誨只要老實念一句阿彌陀神力不可測八哥稱佛名皆生極樂國徃生集云潭州人有養鴝鵒者嘗念佛既亡以棺葬之忽生青蓮花一朵自其口出有頌之者云有一靈禽號八哥解隨僧語念彌陀死埋平地蓮花發人不回心怎奈何散持有功并序古崑法師法華經云若人散亂心入於塔廟中一稱南無佛皆已成佛道西齋詩云魂飛心散亂佛號罪銷鎔蓮爍如初日西昇極樂宮秘藏指南云深信切願念佛而念佛時心多散亂者即是下品下生下生花開雖遲樂勝天宮永脫輪迴位居不退敬遵此旨而述頌言散亂持名大有功經文明載法華中散稱一句皆成佛多誦故知道德充散亂持名大有功橫超帶業最圓融彌陀願海如斯異諸佛咨嗟讚不窮散亂持名大有功往生不落疑城中暫時九品分高下究竟莊嚴與佛同散亂持名大有功無邊教海盡融通但憑記數常專念不必先求妄想空散亂持名大有功幽途蒙照悉皆通莫令佛日西山落那怕迷雲百萬重散亂持名大有功彌陀攝受德無窮任憑襍念常侵擾佛號厲稱莫放鬆散亂持名大有功如當亂世出英雄不愁盜賊千千萬只要將軍智力充念佛開心頌并序古崑法師余自學淨宗以來每見念佛之人或執著悟門意不開暢或惡嫌妄想心生憂愁因此二種不能死盡偷心竭力念佛故徹悟禪師云淨土一門最初省求悟門末後不待發慧而慧自發不須懺業而罪自消不斷煩惱而妄自空至極省要至極徑捷及其證入至極廣大至極究竟大求開悟蓮宗不必求開悟六字洪名須保護但得口中刻刻持聲聲喚應天真父蓮宗不必求開悟應定彌陀多少數日日能持十萬聲時時常走歸元路念佛得妙一心念佛妙無窮不用參求理自通念到臨終生極樂等閒大振古家風一心念佛妙無窮暫到同居四土融具縛伴中多補處微風聲裏演真宗一心念佛妙無窮金口親傳向上宗諸佛廣長同作證愚夫愚婦悉能通一心念佛妙無窮智者深知不面東最後舉揚無別事殷勤獨讚藕華宮不問如何妄想不必問如何總是前生業障多久病暫時纔服藥安能便得離沉疴妄想不必問如何當起悲心念佛陀莫恨持名多散亂須憑信願脫娑婆妄想不必問如何全在彌陀念得多襍亂垢心能記佛當知罪業已消磨禪門日誦示子出家偈裴休居士含悲送子入空門朝夕應當種善根身眼莫隨財色轉道心須向歲寒存看經念佛依師教苦志明心報四恩他日忽然成大器人間天上獨稱尊四恩者父母師長國王施主淨土聖賢錄并種蓮集今將淨土聖賢錄中臨終有詩偈者略錄數傳以為徵信天下萬事皆可假託獨生死不可假託古今生西方不一而足或異香滿室預知時至天樂鳴空留偈而逝夫臨去之際既如是安閒所到之方必定是非常之福地有智人豈可不同生安養耶祖朗大師傳祖朗姓李薊州人九歲出家禮圓通國師為師真祐間賜號圓通大師日誦彌陀數萬聲年七十四將示寂預告其徒曰吾生緣盡矣其徒訝之後七日口占偈跏趺而卒偈曰咄這皮袋常為患害繼祖無能念佛有賴來亦無來去亦無礙四大五陰一時敗壞且道還有不壞者麼良久云浮雲散盡月昇空極樂光中常自在起信大師傳起信字香海姓單富春人父通內典令信出家徧參知識至蘇州遇會一傳公示念佛法門信即返杭閉關日課彌陀十萬聲嘉慶十七年十月十九日盥沐易衣念佛坐逝逾時頂可灼手有念佛歌曰念佛好念佛好萬事從頭一筆埽幾回背父走風塵旅邸神魂多顛倒不參禪不矜教一爐香篆縈繚繞奔波肩擔沒來由訪友尋師何日了休外求只內照衣裏摩尼無價寶應聲現色忒分明六道神光誰欠少水自流山自峭靜裏觀來都入妙笑他名利日忙忙自在真修誰能造月沉西鐘報曉漫說容顏未衰老古來賢哲若河沙誰非白骨埋荒草獨此心無壽夭脫離苦海無煩惱百年身世等空華空華勘破一長嘯鉢囊懸拄杖抝撇却塵緣歸路早人生定數已安排佛本天真非矜造閒住庵懶談道吏難役兮君難召禪牀鎮日坐忘機碧眼胡僧覰不到嚗晴檐補破襖一盂脫粟隨緣飽敢云閉戶慕清高一非目視諸方藐生寡交死絕弔氣盡皮囊便撇掉土埋火塟總由他不賸兒孫免不肖苦莫悲喜莫笑總是浮生夢未覺大家拋卻瓜葛藤刀環請唱還鄉調有一言最簡要世人如入羅網鳥欲脫羅網何處求唯有勸君念佛好冬瓜和尚傳冬瓜和尚遺其名姓孫杭州人嗜食冬瓜故名出家華嚴庵為人緘默竟日遊行街市寒暑無間人莫之測與鄰庵僧慧照為友將寂之前告照曰新正六日吾行矣汝合來送屆期和尚赴齋返見照先在曰汝何來照笑曰汝與我約特來相送耳和尚曰微子言幾忘卻遂盥沐禮佛謂照曰既行不可無偈為我書之怡然而逝偈曰終日走街坊心中念佛忙世人都不識別有一天堂尼道乾大師傳尼道乾字世禪嘉禾雙溪陳氏女年十七出家操履真實順逆一如庵設念佛堂晝夜魚聲不絕者垂四十年嘉慶廿五年冬示微疾十一月十一日謂其徒曰吾明日寅時當去至時說偈命眾同聲念佛吉祥而逝偈曰八十八年無貪無戀歸去來兮水清月現李知遙居士傳李知遙長安人篤志淨土為五會念佛導諸眾善晚得疾忽云和尚來也洗潄著衣然香頂禮聞空中說偈就牀上泊然而化異香滿室眾共聞之其偈曰報汝李知遙功成果自招引君生淨土將爾上金橋王日休居士傳王日休字虗中龍舒人宋國學進士棄官不就專修淨業布衣蔬食日課千拜著龍舒淨土文十卷行世普勸修持導引咸修淨土將卒前三日徧別道友勗以精進及期禮誦如常至三更忽厲稱佛數聲唱言佛來迎我屹然立化其詩曰五更報曉莫貪眠抖擻精神向佛前一拜一聲彌陀佛西方早種一枝蓮黃生居士傳黃生潭州人以鍛鐵為生每打鐵時念佛不絕一日占頌令人書之且云我去後可將此頌流布勸人念佛即化去其頌曰玎玎璫璫久煉成鋼太平將近我往西方周夢顏居士傳周夢顏一名思仁字安士崑山諸生博通經藏深信淨土法門自號懷西嘗以眾生造無量罪唯淫殺居半因著戒殺書名萬善先資懇切深痛每過一切神祠必祝云願尊神發出世心勿受血食一心念佛求生淨土思仁自今二十四歲至壽盡中間若殺一小魚蝦乃至家中眷屬若有一人傷一蚊蟻尊神是糾是殛迅雷殛碎所著書板臨河見魚仰面見鳥不思救度反萌殺機亦同此誓夢寐見人殺生不能至心稱佛名號發救度心而反歡喜贊成其事亦同此誓其戒淫書名慾海回狂斷淫窮源又輯勸修淨土書四卷名西歸直指又著陰隲文廣義三卷引入出世法門乾隆四年正月與家人訣云將西歸請以香湯卻之曰我香湯沐浴久矣談笑而逝異香滿室年八十四其勸世歌曰今日奔馳明日奔馳忙忙碌碌何日住使盡心機結盡冤讐總為妻兒作馬牛妻兒是主我是奴一逢使喚便奔波妻兒是鎻我是囚去去來來不自由妻兒是繭我是蠶被他裹住受辛酸妻兒是井我是雪只待填滿方休歇世間多少烈丈夫往往甘受妻兒苦究竟妻兒何所用生死分途不相共不知撐開眼看破娑婆險不如用著力快與魔王敵阿彌陀是我父早辦慈心來救我阿彌陀是我母早有法乳來養我安養國是我宅黃金為地真難得蓮花臺是我胎七寶為座佛持來不須弄智巧不要費錢財只須口口是彌陀念念在菩提要往生原容易佛既提𢹂我我學佛提𢹂四恩三有盡回施八難三途皆沾濟將此西方九品蓮處處栽培盡大地此歌見古今襍錄羅𠃔枚居士傳羅𠃔枚太倉人以多病棄舉業參檗巖了徹向上復回心淨土康熙四十年秋病且革忽聞空中聲云勝蓮居士尚餘壽一紀因自號勝蓮時州人罕知修淨業𠃔枚倡念佛社三四處諸善咸樂成之年七十一其年六月二日徧別親友告以初六日辭世至期端坐說偈偈畢寂然家人哭喚不已忽張目曰累我更遲七日至十四日辰刻曰大士來合掌向西稱佛而脫其偈曰七十一年拖著皮袋今日撇下何等自在彭希涑居士傳彭希涑字樂園號蘭臺蘇州元和廩生二林居士從子也少舉於鄉喜疏食因疾遂信向佛持六齋日課西方佛名求生淨土雖舟車南北未嘗廢忘嘗作回向詩數首乾隆五十八年十月三日病𭼠痢絕口不及家事日唯勸母念佛十三日早命人張接引像移榻向西至晚念佛右脇而逝異香滿室其詩曰風力吹人豈自由幻緣牽引惹閒愁病魔天遣重重逼垂死方悲不早修營營逐逐不如閒人命須知呼吸間卻恐修行迷正路臨歧回首黑漫漫靜觀深時落日斜了知極樂路非賖十年蕩子無歸處一念回光便是家心心相續憶彌陀萬事浮雲一任他何時命終生彼國現前先已出娑婆姜見龍居士傳姜見龍字元標吳縣人好為諸善家遂中落習眼科自活初學長生術一夕夢巉崖幽谷陰風颯然行數里忽見天日幢幡蔽空寶輿中一人趺坐身金色見龍請救輿中人言汝能發願否曰願從今日作佛家奴曰甚善明日當有比丘導爾修行勿錯過言畢不見及旦果有僧至為言修行無過念佛能念佛決生西方得不退轉疾成正覺見龍大喜日持佛名聲徹里巷乾隆四十三年八月書偈而逝年七十五其偈曰脫卻五濁苦往生極樂土七寶蓮胎圓一念成正果吳濂居士傳吳濂字芑謀元和庠生父奉佛父病僧來問疾開示念佛法門濂在旁恍然有省遂棲心淨業為人簡默念佛無間人不知也嘗語所知曰我志固有大者在一日小腹忽患瘤瘤潰血不止因賦詩二絕臨沒前三日預知時至請僧助念跏趺合掌而終時嘉慶十九年二月二十三日其詩曰贅瘤還繫贅瘤身自歎今生半廢人四大本來無我相皮囊雖好不多春不用良方不用醫自家有病自家知從今晝夜彌陀佛證到金剛不壞時張師誠居士傳張師誠字心友號蘭渚湖州歸安人為江蘇巡撫見蘇城殺業重屢出示勸戒遇放生河嚴禁捕魚署中不宴客不殺生已而長齋奉佛棲心淨土自號一西居士擇前賢淨土論說輯徑中徑又徑一書後附淨土歌詠其自作數首最為警切道光八年乞假歸里靜居斗室一意西馳逾年卒臨終時誦彌陀經畢纔舉佛號至第五聲寂然而逝其詩曰佛緣幸遇識洪名火急西歸此一生不向此生拚力去胞胎再入墮無明纔提佛號眾魔侵降伏云何到一心口耳相聞心應手牟尼歷歷字推尋最怕臨期神識迷舌根堅硬氣難提若非平日心專一那得資糧助往西業多常恐失人身縱得人身亦火坑欲出火坑無別術風帆順水樂生蔣十八居士與妻同傳蔣十八妻者海鹽人中歲與其夫合志修行斷除愛慾日誦大乘經歷四十餘年一日各洗潄更衣炷香唱佛名各書一頌而逝蔣頌曰這個幻身四大合成今日分散各歸其根諸幻既滅灰飛煙絕如空中風猶碧天月既無障礙又能皎潔一切永斷無有言說四十年來脫離嗜慾惟闡大乘朝誦暮讀今朝撒手西歸自有現成果足其妻頌曰看過蓮經萬四千平生香火有因緣西方自是吾歸路風月同乘般若船馮善女人傳馮氏名法信少多病從慈受禪師求卻病方師教以持齋念佛遂信受修西方靜觀起居動靜以西為歸家事淨業兩不妨廢十年如是一日書偈畢曰支那緣盡行即西歸其年十二月語侍者云吾已神遊淨土而禮慈尊萬億佛子慶我得生其國至宮殿林沼與觀經所說無二到者方知乃合掌誦佛右脇而逝偈曰隨緣任業許多年枉作耕牛大可憐打叠身心早脫去免將鼻孔被人牽崔善女人傳載徃生集崔婆淄州人東平梁氏之乳媼也為人樸愿早斷葷血主母晁氏留意禪學婆在旁惟日誦阿彌陀佛未嘗有間年七十二下痢持念益力忽唱一偈或問婆何時當去曰申時去已而果然茶毗時舌獨不化若蓮華然其偈曰西方一路好修行上無條嶺下無阬去時不用著鞋韈為有蓮華步步生古今女流往生淨土皆有祥瑞百五十餘人見聖賢錄並種蓮集其餘未曾目覽甚夥今此書中選女眾非少也因臨終未留詩偈者故未錄弟子眾等一心頂禮十方常住三寶釋迦世尊文殊普賢諸大菩薩彌陀世尊觀音勢至清淨海眾諸大菩薩證明攝受發愿合集功德普皆迴向弟子等眾曠大劫來至於今日既迷本性常在輪迴三業六根無惡不造三途八難無苦不嘗生死浩浩解脫何期今遇最上乘得生微信聞淨土法現已知歸雖精進而恨其遲倘懈怠而往生莫及今刻此書普利同流警䇿身心為淨之助立長課以念佛為西方之歸普愿法界有情聞此蓮音同植善根伏愿父母師僧歷劫冤親一切靈蠢蒙彌陀之愿光承觀音之慈力三障頓消四土圓淨偈曰法流心通化諸障礙信愿行圓超生蓮界普利十方度生靈快念佛三昧週流法界一該一切圓融無外法法靈通心心自在空諸娑婆同生清泰常持此心未來不怠
