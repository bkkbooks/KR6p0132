body:
  text: 全唐詩寒山大士人生不滿百常懷千載憂自身病始可又為子孫愁下視禾根土上看桑樹頭秤鎚落東海到底始知休惡趣甚茫茫冥冥無日光人間八百歲未抵半宵長此等諸癡子論情甚可傷勸君求出離認取法中王可畏輪迴苦往復似翻塵蟻巡還未息六道亂紛紛改頭換面孔不離舊時人速了黑暗獄無令心性昏世有一等流悠悠似木頭出語無知解云我百不憂問道道不會問佛佛不求子細推尋著茫然一場愁自樂平生道煙蘿石洞間野情多放曠長伴白雲閒有路不通世無心孰可攀石牀孤夜坐圓月上寒山大海水無邊魚龍萬萬千遞互相食噉冗冗癡肉團為心不了絕妄想起如煙性月澄澄朗廓爾照無邊如許多寶貝海中乘壞舸前頭失卻桅後頭又無柂宛轉任風吹高低隨浪簸如何得到岸努力莫端坐人生在塵蒙恰似盆中蟲終日行遶遶不離其盆中神仙不可得煩惱計無窮歲月如流水須臾作老翁寒山出此語復似顛狂漢有事對面說所以足人怨心真出語直直心無背面臨死度柰何誰是嘍囉漢冥冥泉臺路被業相拘絆上人心猛利一聞便知妙中流心清淨審思云甚要下士鈍暗癡頑皮最難裂直待血淋漓始知自摧滅看取開眼賊鬧市集人決死屍棄如塵此時向誰說男兒大丈夫一刀兩段截人面禽獸心造作何時歇可歎浮生人悠悠何日了朝朝無閒時年年不覺老總為求衣食令人生煩惱擾擾百千年去來三惡道勸你休去來莫惱他閻老失脚入三途粉骨遭千擣長為地獄人永隔今生道免你信余言識取衣中寶世有多解人愚癡徒苦辛不求當來善唯知造惡因五逆十惡輩三毒以為親一死入地獄長如鎮庫銀瞋是心中火能燒功德林欲行菩薩道忍辱護真心老病殘年百有餘面黃頭白好山居布裘擁質隨緣過豈羨人間巧樣模心神用盡為名利百種貪婪進己軀浮生幻化如燈燼塚內埋身是有無世人何事可吁嗟苦樂交煎勿底涯生死往來多少劫東西南北是誰家張王李趙權時姓六道三途事如麻只為主人不了絕遂招遷謝逐迷邪寒山頂上月輪孤照見晴空一物無可貴天然無價寶埋在五陰溺身軀又拾得大士嗟見世間人箇箇愛喫肉椀楪不曾乾長時道不足昨日設箇齋今朝宰六畜都緣業使牽非干情所欲一度造天堂百度造地獄閻羅使來追合家盡啼哭鑪子邊向火鑊子裏澡浴更得出頭時換卻汝衣服閉門私造罪準擬免災殃被他惡部童抄得報閻王縱不入鑊湯亦須臥鐵牀不許雇人替自作自身當三界如轉輪浮生若流水蠢蠢諸品類貪生不覺死汝看朝垂露能得幾時子古佛路凄凄愚人到却迷只緣前業重所以不能知欲識無為理心中不挂絲生生勤苦學必定覩吾師和寒山詩楚石禪師無始墮蒼茫何由發智光人間憂日短地下恨時長萬水朝東溟眾星拱北極悠悠天地間畢竟承誰力今時學道人未困先疲極無量劫修行皆由勇猛力舌是興亡本心為福禍根萬般皆自造誰謂屬乾坤種福如種木種德如種糓所積既已多所須無不足當求早成佛自具出世福福德在世間徒然長三毒往往昏如醉區區喚不回都忘許大事真箇是癡獃安危自業招禍福非天降臨死壞爛時不如猪狗相萬善先資周思仁仁列五常首慈居萬德先皇哉三教論異口若同宣人人愛壽命物物貪生全雞見庖人執驚飛集案前豕聞屠價售兩淚涌如泉方寸原了了祇為口難言驀受刀砧苦腸斷命猶牽白刃千翻割紅爐白沸煎炮烙加彼體甘肥佐我筵此事若無罪勿畏蒼蒼天古來生殺報往復如轤旋吾昔弱冠時目擊生哀憐蒐羅今昔事將盈數萬言誓拔三途苦此志久愈堅家政濁世慈祥門第天宮福祉加臨曾聞一善敵災星何況恩施多命祖父堅持殺戒子孫方有觀型莫將細物視為輕試就芻蕘一聽慶賀人類欣逢吉事眾生對泣哀鳴微軀定是享家賓一夜千翻凜凜誰料業緣會遇冤家次第相尋披毛戴角口無聲俛首牽來就刃婚嫁兩姓姻緣乍合百年偕老茲辰重重瑞氣藹門庭鼎鑊烹炮侈盛堪歎雌雄物類亦同夫婦恩情只緣宿世少慈心今日雙雙填命喪祭笑語音容不再秋霜春露含悲擊鮮薦爼望魂歸增卻重泉蘖累孰若申嚴佛事虔修五戒三歸亡親未度子心虧此語當銘五內器用吾視閻浮器皿炎天盡伏昆蟲朔風一起轉成空不待嚴寒冰凍但是含靈尚在貪生畏死皆同莫言救護了無功大小一般知痛衛生穀氣足以資神肉味不宜多食萬病原來從口入此理貪夫不識但顧舌根三寸不念身軀七尺真是堪憐不堪惜累及妻孥哭泣方便天上人間勝事勤修方便為先今年錯過待明年可惜光陰荏苒日裏云為動靜宜思裕後光前護生之術本無邊惟在隨機自勉言語禽獸臨刑片刻哀號最屬堪憐霜刀沸水在其前一語無由置辨想是宿生在世口中不發嘉言君今目擊此奇冤啟齒須存方便勸戒蘧恥獨為君子舜思善與人同發心度世貴含宏在在期於感動若藉一身一口徒然舌敝耳聾迭相化導易為功可與言時休縱強恕一指投於沸湯徧體皆如刀割從來殺報難逃脫萬劫紛紛酬答片念殺機微動勇猛回頭止遏力行善事如飢渴漸與仁慈符合懺悔堪駭娑婆濁世凡夫顛倒昏迷惡緣日熾善緣微愁殺眼光落地今世因循不悔他生欲懺無期冤仇迭報不差移曾見誰人逃避發心杳杳十方國土無非性量包涵眾生未度我之愆手握乾坤八面要與人天大眾多生多劫周旋發心二字廣無邊佛佛於中顯現求生捷徑鄭澄德序曰世人苦於刀兵夫兵災皆過去現在兩重殺業之所感召也惟以生機轉殺機則逢凶化吉矣刀兵在人道或數十年數百年一有而畜道無日不有天道好生惡殺人當戒殺放生莫因口腹動刀砧折盡生平福分水國魚蝦龜鼈林間走獸飛禽與人同此一心靈害命終須索命前世殺他是我今生殺我是他顛顛倒倒做冤家何口纔能放下不若我先戒殺善心一發無涯吉神呵護有雲霞免得傷殘四大索命何時了局因緣返覆成讐勸人當下早休休悔過還能自救我說放生念佛譬如苦海之舟能依此法自勤修解釋冤纏無咎昔有萬三沈姓專於水族施恩池中聚寶獲金盆變出金銀無盡一啣環報德楊家高大其門含生負氣有靈根莫害區區物命亦有真人思邈放魚救得神龍藥方傳出廣陰功證入仙班鸞鳳最是蓮池老衲放生戒殺文工心心回向到蓮宮上品往生尊重富貴神仙佛國皆從戒殺修來吾人何必更疑猜苦借無邊業債目下干戈到處東奔西竄哀哉各人早把殺心灰保得身家安泰衛生集彌勒菩薩勸君勤放生終久自長壽若發菩提心大難天須救又呂純陽物要死時汝救他汝要死時天救汝延生種子別無方戒殺放生而已矣又陶石簣一指納沸湯渾身驚欲裂一針刺己肉徧體如刀割魚死向人哀雞死臨刀泣哀泣各分明聽者自不識又壽光禪師放生續命事雖庸無限陰功在此中一歲積成千種福十年培養萬重功已赴網羅遭困厄將投湯火近驚冲臨刑遇赦恩無量彼壽隆兮爾壽隆慶壽戒殺黃彼岸人壽遙期到百年到來雞犬亦歡然忍心滿座稱觴客飲血茹毛不一憐慈心寶鑑戒殺偈二首慈受禪師世上多殺生遂有刀兵劫負命殺汝身欠財焚汝宅離散汝妻子曾破他巢穴報應各相當洗耳聽佛說買肉須要肥買魚須要活買衣須要美買田須要濶若教買命放一毛不肯黃泉路途險失脚恐難脫戒殺詩一首白樂天世間水陸與虗空總屬皇天懷抱中試令設身遊釜甑方知弱骨受驚冲戒殺頌二首黃山谷我肉眾生肉名殊體不殊原同一種性只是別形軀苦惱從他受肥甘為我須莫教閻老判自揣看何如勸君休殺命背面復生瞋喫他還喫汝尋環作主人戒殺詩愿雲禪師千百年來碗裡羮冤深如海恨難平欲知世上刀兵劫但聽屠門半夜聲又白香山誰道羣生性命微一般骨肉一般皮勸君莫打三春鳥子在巢中望母歸又陸放翁血肉淋漓味足珍一般痛苦怨難伸設身處地捫心想誰肯將刀割自身戒殺俚言永明大師堪嗟人心如鐵終日殺生造業他身滋養你身心上如何忍得為人若遭疾病便去殺生造業你願身體平安他豈該數在劫爹娘愛惜嬌兒多將生靈損折你子求命延長他命不留一刻父母生辰之日宰殺猪羊等物願親長命長生他就該死該滅飛禽鷹等鳥走獸虎狼一切世間只有人狠射箭捕網打獵水類田雞螺螄黃鱔烏魚鰍鼈分明不害於人何苦將他命絕咬牙切齒一刀登時流下鮮血燒起一鍋滾水毛衣退得淨潔開腸破肚剜心將他渾身碎切鍋中烹煑煎燒五味調和美舌喫下咽喉三寸借問有何清潔忽然大限來到一切珍羞拋撇及至閻王殿前但見許大冤業前面拖拖扯扯後頭推推拽拽個個討命冤家不繇悲悲切切渾身戰戰兢兢心中怛怛怯怯判官來遞冊簿應當還他罪業閻王鐵面無情銅鎚打徹骨血滾湯萬死千生刀山千槍萬割油煎鋸解火燒又灌滾銅熱鐵受盡地獄諸苦再等閻君發帖改頭換面出來披毛帶角轉劫生被刀槍割斬死遭湯火烹烈又等別人囓他還他殺生罪業變盡牛馬猪羊生在蠻陌之國身無蔽體衣裳口無充飢穀麥要喫美口茶飯不知何年何月歷盡諸般苦楚方轉天堂佛國巴得一個人身還有許多罪業不時生癤生瘡晝夜灙濃灙血不知禮義綱常不曉東西南北更遭短命凶亡皆為殺心不絕信心皈依三寶常遇高僧傳說聽得一言半語仗此佛法功德誠意精持五戒發願修行懇切彌陀一念純真彌陀親來迎接往生淨土西方免在人間造業西齋淨土詩楚石禪師一寸光陰一寸金勸君念佛早回心直饒鳳閣龍樓貴難免雞皮鶴髮侵鼎內香煙初未散空中法駕已遙臨塵塵剎剎雖清淨獨有彌陀願力深故鄉別早話歸遲何待君言我自知客路竛竮無一好人生惆悵不多時蒼顏歷歷悲明鏡白髮𣯶𣯶愧黑絲再讀南屏安養賦屋梁落月見丰姿娑婆苦海汎慈舟此岸能超彼岸不直指迷源須念佛橫波徑度免隨流千生萬劫常安泰五趣三途盡罷休縱使身沾下下品也勝豪貴在閻浮人生百歲七旬稀往事回觀盡覺非每哭同流何處去閒拋淨土不思歸香雲瑪瑙階前結靈鳥珊瑚樹裏飛從證法身無病惱況餐禪悅永忘飢說著無常事事輕飢餐渴飲懶經營一心不退思安養萬善同修憶永明淨洗念珠重換綫堅持佛號莫停聲妄緣盡逐空花落閒向風前月下行少年頃刻老還衰須信無常日夜催九十六家邪智慧百千萬劫受輪迴不存寶界花池想爭得刀山劍樹摧但自淨心生願樂此中賢聖許追陪念佛功深罪自除身歸極樂國中居叢林草木璚瑤接大地山河錦繡舒香界來從移步後寶蓮結自放花初玉毫炳煥黃金面天上人間總不如天人莫不證神通一一黃金色相同散眾妙花為佛事盡塵沙界起香風身光觸體成柔輭樂具流音說苦空却倚彫欄看寶樹無邊佛國在其中經行地上盡奇珍異草靈苗步步春國界初無三惡道莊嚴自有眾天人長空落日如懸鼓大聖無時不現身從曠劫來今始悟故鄉曾不隔纖塵池上藕花花上人佛光來照紫金身更聞妙法除心垢盡救迷情出苦輪舉步徧遊塵點國利生終滿涅槃因娑婆界上光陰短極樂知經幾劫春淨土真為不死鄉雲霞影裏望殘陽珠樓玉殿空為體翠樹金花密作行款好風搖菡萏依依流水帶鴛鴦分明記得無生曲便請知音和一場一箇浮泡夢幻身如何只是縱貪瞋好尋徑直修行路休學愚癡放逸人護戒還同氷雪淨操心要與聖賢親明明指出西飛日有識皆令達木真幾回夢到法王家來去分明路不差出水珠幢如日月排空寶葢似雲霞鴛鴦對浴金池水鸚鵡雙啣玉樹花睡美不知誰喚醒一鑪香散夕陽斜風滿瑤臺水滿池花開菡萏一枝枝細聽鳧鴈鴛鴦語正是身心解脫時瓔珞自然成寶玉袈裟全不假機絲如來相好瞻無盡所得明門誓總持遙指家鄉落日邊一條歸路直如弦空中韻奏般般樂水上花開朵朵蓮襍樹枝莖成百寶羣居服食勝諸天吾師有願當垂接不枉翹勤五十年一朵蓮含一聖胎一生功就一花開稱身瓔珞隨心現盈器酥酡逐念來金殿有光吞日月玉樓無地著塵埃法王為我談真諦直得虗空笑滿腮珠王宮殿玉園林坐臥經行地是金舍利時時宣妙響頻伽歷歷奏仙音返聞頓悟無生理常住周圓不動心觸目皆為清淨土來從曠劫到如今曾於淨土結因緣二六時中現在前每到黃昏增善念遙隨白日下長天如來寶手親摩頂大士金軀擬拍肩不借胞胎成幻質吾家自有玉池蓮一國巍巍一寶王無朝無暮起祥光尼拘律樹真金果優鉢羅花輭玉房見體自明非日月知春長在不氷霜又遊佛剎歸來也贏得天葩滿袖香將參法會禮金仙漸逐香風出寶蓮紅肉髻光流不盡紫金身相照無邊重重樹網垂平地一一花臺接遠天諸佛界中希有事了如明鏡現吾前上淨令人道果圓娑婆性習一時遷魚離密網遊滄海雁避虗弓入遠天來往輪迴從此息死生煩惱莫能纏無心即是真清泰有染如何望寶蓮即心即佛斷千差名教名禪共一家果證無邊身相好光流不可說河沙餘方妙麗終難竝本願精深豈易誇大抵熏修須及早臨終免被業緣遮西行三十二河沙彼國莊嚴是我家但用一真為種子全將七寶作蓮花娑婆極厭今生苦懈慢無令後世差寶月頓從心水現如今光影正交加佛自凡夫到果頭親曾歷劫用功修淨豈是天然得大道初非物外求先悟色空離欲海後嚴福慧汎慈舟今來古往皆如此度盡眾生願未休何處全收念佛功水光湛碧藕花紅廣長舌覆三千界清淨門開二十空雲網相連珠的礫風柯自奏玉玲瓏平生不結神仙願自小思歸極樂宮須摩提國讚何窮不與他方佛境同百味酸甜長滿鉢一身輕健任遊空初心便獲無生忍具縛能教宿命通今古往生留傳記盡塵沙界扇真風曾聞金鼎煉硃砂一服飛驚玉帝家輕舉似風飄柳絮美顏如日暎桃花況修淨業身心妙兼得慈尊願力加此是長生無比法仙經十卷不須誇一帶雲山一草堂一瓶淨水一爐香心融有念歸無念日課朝陽到夕陽紅杏雨餘春正好白蓮風細夏偏長假如劫火燒千界不動吾家聖道場紅蓮常暎白蓮開只有金蓮不易栽念念若能離渾濁生生從此脫胞胎且依彼國嚴新果卻徧他方發舊荄事與種蓮無少異根苗原向淤泥來千經萬論不虗標共指西方路一條念念刮磨心垢淨時時防護道芽焦栖蓮自覺身安穩得果須令地動搖謾費工夫推甲子娑婆大劫只崇朝近有人從淨土來池心一朵玉蓮開正當萼上標名字已向身前結聖胎極樂逍遙長不死閻浮逼迫最堪哀法王特地垂慈愍同坐黃金百尺臺念極心開見佛時自然身到碧蓮池火輪罪淨千千劫琪樹光分萬萬枝善友深談終不厭靈禽妙語實難思功成圓滿須臾事尚謂奔流閃電遲佛袈裟下失人身重得人身有幾人萬行不如修白業一心何苦戀紅塵法王立誓丘山重迷子思歸涕淚頻若解返觀觀自性明珠百八總家珍朝朝暮暮道心中歲歲年年佛事同一往進修安樂界六時朝禮法王宮方袍不厭香煙黑坐具何妨手汗紅如此出家今有幾灼然認得主人公西望紅霞白日輪仰觀寶座紫金身一方土淨方方淨十念心真念念真生極樂城終不退盡虗空界了無塵向來苦海浮還沒何幸今為彼岸人娑婆生者極愚癡眾苦縈纏不解思在世更無清淨業臨終那有出離時百千經裏尋常勸萬億人中一二知珍重大仙金色臂早來𢹂我入華池教口禪心兩不差青黃赤白總蓮花要知佛祖無文字休學兒童算海沙高座談玄明似鑑古人得道數如麻淨散在羣經裏非獨華嚴與法華阿彌陀佛大醫王接引人歸不死鄉信手拈來皆妙藥和盤托出盡奇方粟中未覺乾坤大壺內那知歲月長只這病緣無起處通身熱惱自清涼閒中獨坐面西方手把輪珠念不忘佛號能令心地淨舌根便作藕花香暉暉日到銜山處閃閃金浮滿室光此景此時無別想許君親見鼓音王濁惡眾生也可憐菩提道果幾時圓總云國土隨心淨爭奈形神被業牽正劍揮來藤落樹迷雲散盡日流天虗空畢竟無遮障淨土滔滔在目前析善導和尚念佛偈八首漸漸雞皮鶴髮精神未免枯竭可憐老眼昏花恰似浮雲籠月妄想隨時出生貪心何日休歇不如及早念佛苦海從今超越看看行步龍鍾首腹猶如簸舂涉遠奈何力倦登高徒自情濃出門遠路千里拄杖雲山萬重不如及早念佛速瞻寶座慈容假饒金玉滿堂珠翠綺羅豔妝花下時時歌舞樽前日日杯觴尋思無限活計畢竟難逃死亡不如及早念佛臨終定往西方難免衰殘老病休誇氣力強盛朱顏能得幾時白髮忽然滿鏡有限光陰盡來無常殺鬼催併不如及早念佛悟取彌陀自性任爾千般快樂饒君萬種方略何由永固此身謾說長生妙藥非久形神脫離怎容頃刻停泊不如及早念佛淨土方為安樂無常終是到來三界眾生可哀如入寶山相似自甘空手而回彌陀全體呈露淨土隨方展開不如及早念佛轉身得坐蓮臺唯有徑路修行實從自心發生不離如今正念頓除歷劫無明癡人尚自執著濁染何山廓清不如及早念佛菩提道果圓成但念阿彌陀佛此心念念是佛佛外更無別心心外更無別佛吹開萬里白雲涌出一輪紅日寶樹華池現前語言文字難述娑婆苦漁家傲聽說娑婆無量苦能令智者增憂怖壽命百年如曉露君須悟一般生死無窮富綠髮紅顏留不住英雄盡向何方去回首北邙山下路斜陽暮千千萬萬寒鴉度聽說娑婆無量苦千思萬算勞腸肚地水火風爭勝負何牢固到頭盡化微塵去