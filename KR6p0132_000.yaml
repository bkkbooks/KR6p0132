front:
  text: 蓮修必讀自序佛法粗言及細語皆歸第一義凡詩歌偈頌皆洞明本宗從大悲心中流出依經立說發揚念佛三昧無餘蘊矣茲引導初機借語明心因言見道道見則言亡此所謂即文字而非文字觀如屢見初修未能閱淨宗諸典又難於記誦故將淨土中歌頌已經目覽者隨見隨錄刻行以便讀誦倘有尚於行持好略者雖一言半偈足可依從以了生死也我朝世宗憲皇帝敘寒山大士詩云讀者或以為俗語或以為韻語或以為教語或以為禪語如摩尼珠體非一色處處皆圓隨人目之所見朕以為非俗非韻非教非禪真乃古佛直心直語也佛法如海此書之選如海中一滴自愧法眼未明不無有遺珠之憾切不可以此為究竟亦不可因人微而藐此書不觀曾見蕅益大師西齋詩讚其略曰以茲微妙勝伽陀令我讀誦當參學一讀二讀塵念消三讀四讀染情薄讀至十百千萬遍此身已向蓮花托亦愿後來讀誦者同予畢竟生極樂是為序光緒丙戌年七月佛歡喜日觀如書於揚州藏經院
